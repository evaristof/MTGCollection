spring.application.name=MTGCollection
server.port=8080

# H2 in-memory database
spring.datasource.url=jdbc:h2:mem:mtgcollection;DB_CLOSE_DELAY=-1;MODE=LEGACY
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 console (for dev)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Jackson: emit snake_case JSON so the REST API contract matches the Scryfall
# format expected by the DTOs' @SerializedName annotations
# (Jackson ignores Gson's @SerializedName, so we rely on snake_case derivation
# from the getters instead).
spring.jackson.property-naming-strategy=SNAKE_CASE

# Scryfall API
scryfall.api.base-url=https://api.scryfall.com
