spring.application.name=MTGCollection
server.port=8080

# H2 in-memory database
spring.datasource.url=jdbc:h2:mem:mtgcollection;DB_CLOSE_DELAY=-1;MODE=LEGACY
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 console (for dev)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Jackson: emit snake_case JSON so the REST API contract matches the Scryfall
# format expected by the DTOs' @SerializedName annotations
# (Jackson ignores Gson's @SerializedName, so we rely on snake_case derivation
# from the getters instead).
spring.jackson.property-naming-strategy=SNAKE_CASE

# Scryfall API
scryfall.api.base-url=https://api.scryfall.com
# Number of retries on 429 / 5xx responses before giving up on a Scryfall call.
scryfall.api.max-retries=3
# Base backoff in ms between retries (grows exponentially: base, 2x, 4x, ...).
scryfall.api.retry-backoff-ms=800

# Collection import
# Throttle between Scryfall lookups during an import job, in milliseconds.
# Increase this if you see many HTTP 429 (rate limit) errors from Scryfall.
mtg.import.throttle-ms=300

# Multipart uploads (spreadsheet import)
spring.servlet.multipart.max-file-size=25MB
spring.servlet.multipart.max-request-size=25MB
