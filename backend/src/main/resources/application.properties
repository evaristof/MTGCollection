spring.application.name=MTGCollection
server.port=8080

# ---------------------------------------------------------------------------
# Default datasource: H2 in-memory.
#
# This block is used by:
#   * automated tests (@SpringBootTest / @DataJpaTest) — no active profile
#   * MtgCollectionH2Application — activates the "h2" profile, which inherits
#     these defaults without overriding them
#
# The "prod" profile (activated by MtgCollectionApplication, the default
# packaged entry point) overrides these in application-prod.properties to
# point at PostgreSQL. You can also override any individual property via
# environment variables (e.g. SPRING_DATASOURCE_URL) or CLI args
# (--spring.datasource.url=...).
# ---------------------------------------------------------------------------
spring.datasource.url=jdbc:h2:mem:mtgcollection;DB_CLOSE_DELAY=-1;MODE=LEGACY
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 console (useful when the "h2" profile is active)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Jackson: emit snake_case JSON so the REST API contract matches the Scryfall
# format expected by the DTOs' @SerializedName annotations
# (Jackson ignores Gson's @SerializedName, so we rely on snake_case derivation
# from the getters instead).
spring.jackson.property-naming-strategy=SNAKE_CASE

# Scryfall API
scryfall.api.base-url=https://api.scryfall.com
# Number of retries on 429 / 5xx responses before giving up on a Scryfall call.
scryfall.api.max-retries=3
# Base backoff in ms between retries (grows exponentially: base, 2x, 4x, ...).
scryfall.api.retry-backoff-ms=800

# Collection import
# Throttle between Scryfall BATCH requests during an import job, in milliseconds.
# Each batch covers up to 75 cards via POST /cards/collection, so 100ms between
# batches keeps us well under Scryfall's 10 req/s limit (~10 batches/sec = 750
# cards/sec). Increase this if you still see HTTP 429 (rate limit) errors.
mtg.import.throttle-ms=100

# Multipart uploads (spreadsheet import)
spring.servlet.multipart.max-file-size=25MB
spring.servlet.multipart.max-request-size=25MB

# MinIO configuration (override via env: MINIO_ENDPOINT, MINIO_ACCESS_KEY, MINIO_SECRET_KEY, MINIO_BUCKET)
minio.endpoint=${MINIO_ENDPOINT:http://localhost:9000}
minio.access-key=${MINIO_ACCESS_KEY:admin}
minio.secret-key=${MINIO_SECRET_KEY:admin123}
minio.bucket=${MINIO_BUCKET:mtg-card-images}
