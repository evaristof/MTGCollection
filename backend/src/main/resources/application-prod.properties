# ---------------------------------------------------------------------------
# "prod" profile — PostgreSQL.
#
# Activated automatically by MtgCollectionApplication (the default entry point
# in the packaged jar). Override any value via environment variable or CLI arg
# if you need to, e.g.:
#
#   java -jar mtgcollection.jar \
#        --spring.datasource.url=jdbc:postgresql://db.internal:5432/mtgdb \
#        --spring.datasource.username=myuser \
#        --spring.datasource.password=mypass
#
# or via env vars:
#   SPRING_DATASOURCE_URL=...
#   SPRING_DATASOURCE_USERNAME=...
#   SPRING_DATASOURCE_PASSWORD=...
# ---------------------------------------------------------------------------
spring.datasource.url=jdbc:postgresql://localhost:5432/mtgdb
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=admin
# TODO: move to env var / secret store before exposing the app outside localhost.
spring.datasource.password=admin

# Disable the H2 console (we are not using H2 here).
spring.h2.console.enabled=false

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
